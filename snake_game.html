<!DOCTYPE html>
<html>
<head>
    <title>Snake Game</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background: #222; font-family: Arial; color: #fff; }
        #container { text-align: center; }
        canvas { border: 2px solid #fff; background: #000; }
        #info { margin-bottom: 10px; font-size: 18px; }
        #scores { margin-top: 10px; }
    </style>
</head>
<body>
    <div id="container">
        <div id="info">
            <span>Score: <span id="score">0</span></span> | 
            <span>Time: <span id="timer">0</span>s</span>
        </div>
        <canvas id="game" width="400" height="400"></canvas>
        <div id="scores">
            <div>High Score: <span id="highScore">0</span></div>
            <div>Previous Score: <span id="prevScore">0</span></div>
        </div>
    </div>
    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const box = 20;
        let snake = [{x: 10, y: 10}];
        let food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
        let dir = 'RIGHT';
        let score = 0;
        let highScore = localStorage.getItem('highScore') || 0;
        let prevScore = 0;
        let startTime = Date.now();
        
        document.getElementById('highScore').textContent = highScore;
        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowUp' && dir !== 'DOWN') dir = 'UP';
            if (e.key === 'ArrowDown' && dir !== 'UP') dir = 'DOWN';
            if (e.key === 'ArrowLeft' && dir !== 'RIGHT') dir = 'LEFT';
            if (e.key === 'ArrowRight' && dir !== 'LEFT') dir = 'RIGHT';
        });
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, 400, 400);
            
            snake.forEach((s, i) => {
                ctx.fillStyle = i === 0 ? '#0f0' : '#0a0';
                ctx.fillRect(s.x * box, s.y * box, box, box);
            });
            
            ctx.fillStyle = '#f00';
            ctx.fillRect(food.x * box, food.y * box, box, box);
            
            let head = {...snake[0]};
            if (dir === 'UP') head.y--;
            if (dir === 'DOWN') head.y++;
            if (dir === 'LEFT') head.x--;
            if (dir === 'RIGHT') head.x++;
            
            if (head.x < 0 || head.x >= 20 || head.y < 0 || head.y >= 20 || snake.some(s => s.x === head.x && s.y === head.y)) {
                prevScore = score;
                if (score > highScore) {
                    highScore = score;
                    localStorage.setItem('highScore', highScore);
                }
                document.getElementById('prevScore').textContent = prevScore;
                document.getElementById('highScore').textContent = highScore;
                setTimeout(() => location.reload(), 1000);
                return;
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score++;
                document.getElementById('score').textContent = score;
                food = {x: Math.floor(Math.random() * 20), y: Math.floor(Math.random() * 20)};
            } else {
                snake.pop();
            }
            
            document.getElementById('timer').textContent = Math.floor((Date.now() - startTime) / 1000);
        }
        
        setInterval(draw, 100);
    </script>
</body>
</html>
